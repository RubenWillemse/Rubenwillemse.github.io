<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Urban Parkour Runner</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- MENU -->
<div id="mainMenu" class="screen">
    <h1>URBAN PARKOUR</h1>
    <button onclick="startGame()">PLAY</button>
    <button onclick="startTutorial()">TUTORIAL</button>
    <button onclick="openShop()">SHOP</button>
</div>

<!-- SHOP -->
<div id="shopScreen" class="screen hidden">
    <h2>SHOP</h2>
    <p>Coins: <span id="coinDisplay">0</span></p>
    <div class="shopGrid">
        <div class="skinBox">
            <canvas id="previewBlack" width="80" height="120"></canvas>
            <button onclick="buySkin('black',0)">Default</button>
        </div>
        <div class="skinBox">
            <canvas id="previewGold" width="80" height="120"></canvas>
            <button onclick="buySkin('gold',200)">Gold (200)</button>
        </div>
    </div>
    <button onclick="backMenu()">BACK</button>
</div>

<!-- GAME OVER -->
<div id="gameOverScreen" class="screen hidden">
    <h2>GAME OVER</h2>
    <p id="finalScore"></p>
    <button onclick="restartGame()">RESTART</button>
    <button onclick="backMenu()">MAIN MENU</button>
</div>

<div id="tutorialOverlay" class="hidden"></div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

let gameMode="menu";
let gravity=0.9;
let speed=7;
let coins=0;
let score=0;
let groundY;

let player={
    x:200,y:0,width:40,height:90,
    velocityY:0,jumping:false,doubleJump:false,
    sliding:false,rotation:0,color:"black",
    legAngle:0,armAngle:0
};

let fireBalls=[];
let coinObjects=[];
let smoke=[];

function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
    groundY=canvas.height-140;
}
window.addEventListener("resize",resize);
resize();

/* -------- CONTROLS -------- */
document.addEventListener("keydown",e=>{
    if(e.code==="Space"||e.code==="ArrowUp"){
        if(!player.jumping){
            player.velocityY=-20;
            player.jumping=true;
        }else if(!player.doubleJump){
            player.velocityY=-22;
            player.doubleJump=true;
        }
    }
    if(e.code==="ArrowDown") player.sliding=true;
});
document.addEventListener("keyup",e=>{
    if(e.code==="ArrowDown") player.sliding=false;
});

/* -------- MENU -------- */
function hideAll(){
    document.querySelectorAll(".screen").forEach(s=>s.classList.add("hidden"));
    canvas.style.display="none";
    document.getElementById("tutorialOverlay").classList.add("hidden");
}

function startGame(){
    hideAll();
    canvas.style.display="block";
    gameMode="game";
    reset();
    requestAnimationFrame(loop);
}

function startTutorial(){
    hideAll();
    canvas.style.display="block";
    gameMode="tutorial";
    reset();
    document.getElementById("tutorialOverlay").classList.remove("hidden");
    document.getElementById("tutorialOverlay").innerText="Druk SPATIE om te springen";
    requestAnimationFrame(loop);
}

function openShop(){
    hideAll();
    document.getElementById("shopScreen").classList.remove("hidden");
    document.getElementById("coinDisplay").innerText=coins;
    drawPreview("previewBlack","black");
    drawPreview("previewGold","gold");
}

function backMenu(){
    hideAll();
    gameMode="menu";
    document.getElementById("mainMenu").classList.remove("hidden");
}

function restartGame(){
    document.getElementById("gameOverScreen").classList.add("hidden");
    startGame();
}

/* -------- GAME -------- */
function reset(){
    score=0;
    speed=7;
    fireBalls=[];
    coinObjects=[];
    smoke=[];
    player.y=groundY-player.height;
    player.velocityY=0;
}

/* -------- FIREBALLS -------- */
function spawnFireBall(){
    fireBalls.push({
        x:canvas.width,
        y:groundY-60-Math.random()*200,
        size:25,
        speed:speed+3,
        flame:[]
    });
}

function updateFireBalls(){
    fireBalls.forEach((b,i)=>{
        b.x-=b.speed;

        b.flame.push({
            x:b.x+(Math.random()*20-10),
            y:b.y+(Math.random()*20-10),
            size:Math.random()*10+5,
            alpha:1
        });

        if(b.x<-100) fireBalls.splice(i,1);
    });
}

function drawFireBalls(){
    fireBalls.forEach(b=>{
        b.flame.forEach(f=>{
            ctx.fillStyle=`rgba(255, ${100+Math.random()*100}, 0, ${f.alpha})`;
            ctx.beginPath();
            ctx.arc(f.x,f.y,f.size,0,Math.PI*2);
            ctx.fill();
            f.alpha-=0.03;
        });

        ctx.fillStyle="black";
        ctx.beginPath();
        ctx.arc(b.x,b.y,b.size,0,Math.PI*2);
        ctx.fill();
    });
}

function checkFireBallCollision(){
    fireBalls.forEach(b=>{
        let dx=(player.x+player.width/2)-b.x;
        let dy=(player.y+player.height/2)-b.y;
        let dist=Math.sqrt(dx*dx+dy*dy);

        if(dist<b.size+30){
            endGame();
        }
    });
}

/* -------- COINS -------- */
function spawnCoin(){
    coinObjects.push({x:canvas.width,y:groundY-200-Math.random()*100});
}

function updateCoins(){
    coinObjects.forEach(c=>c.x-=speed);
    coinObjects.forEach((c,i)=>{
        if(player.x<c.x+20 &&
           player.x+player.width>c.x &&
           player.y<c.y+20 &&
           player.y+player.height>c.y){
            coins++;
            coinObjects.splice(i,1);
        }
    });
}

function drawCoins(){
    coinObjects.forEach(c=>{
        ctx.fillStyle="gold";
        ctx.beginPath();
        ctx.arc(c.x,c.y,12,0,Math.PI*2);
        ctx.fill();
    });
}

/* -------- UPDATE -------- */
function update(){
    player.velocityY+=gravity;
    player.y+=player.velocityY;

    if(player.y>=groundY-player.height){
        player.y=groundY-player.height;
        player.jumping=false;
        player.doubleJump=false;
        player.rotation=0;
    }

    if(player.doubleJump) player.rotation+=20;

    player.legAngle+=0.2;
    player.armAngle+=0.25;

    updateFireBalls();
    updateCoins();
    checkFireBallCollision();

    if(gameMode==="game"){
        if(Math.random()<0.02) spawnFireBall();
        if(Math.random()<0.015) spawnCoin();
        score++;
        if(score%500===0) speed+=0.5;
    }
}

/* -------- DRAW -------- */
function drawCity(){
    ctx.fillStyle="#b3e0ff";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#222";
    ctx.fillRect(0,groundY,canvas.width,140);
}

function drawPlayer(){
    ctx.save();
    ctx.translate(player.x+20,player.y+45);
    ctx.rotate(player.rotation*Math.PI/180);
    ctx.strokeStyle=player.color;
    ctx.lineWidth=6;

    if(player.sliding){
        ctx.beginPath();
        ctx.moveTo(-20,0);
        ctx.lineTo(20,0);
        ctx.stroke();
    }else{
        ctx.beginPath();
        ctx.moveTo(0,-30);
        ctx.lineTo(0,30);
        ctx.stroke();
    }

    ctx.beginPath();
    ctx.arc(0,-45,15,0,Math.PI*2);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,-10);
    ctx.lineTo(Math.sin(player.armAngle)*25,10);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,-10);
    ctx.lineTo(-Math.sin(player.armAngle)*25,10);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,30);
    ctx.lineTo(Math.sin(player.legAngle)*25,70);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,30);
    ctx.lineTo(-Math.sin(player.legAngle)*25,70);
    ctx.stroke();

    ctx.restore();
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawCity();
    drawPlayer();
    drawFireBalls();
    drawCoins();
    ctx.fillStyle="black";
    ctx.fillText("Score: "+score,20,40);
    ctx.fillText("Coins: "+coins,20,70);
}

function loop(){
    if(gameMode==="menu") return;
    update();
    draw();
    requestAnimationFrame(loop);
}

function endGame(){
    gameMode="menu";
    document.getElementById("gameOverScreen").classList.remove("hidden");
    document.getElementById("finalScore").innerText="Score: "+score;
}

function drawPreview(id,color){
    let c=document.getElementById(id);
    let x=c.getContext("2d");
    x.clearRect(0,0,c.width,c.height);
    x.strokeStyle=color;
    x.lineWidth=5;
    x.beginPath();
    x.moveTo(40,20);
    x.lineTo(40,80);
    x.stroke();
    x.beginPath();
    x.arc(40,10,10,0,Math.PI*2);
    x.stroke();
}
</script>
</body>
</html>
