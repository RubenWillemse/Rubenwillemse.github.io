<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Urban Parkour Runner</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- MAIN MENU -->
<div id="mainMenu" class="screen">
    <h1>URBAN PARKOUR</h1>
    <button onclick="startGame()">PLAY</button>
    <button onclick="startTutorial()">TUTORIAL</button>
    <button onclick="openShop()">SHOP</button>
</div>

<!-- SHOP -->
<div id="shopScreen" class="screen hidden">
    <h2>SHOP</h2>
    <p>Coins: <span id="coinDisplay">0</span></p>

    <div class="shopGrid">

        <div class="skinBox">
            <canvas id="previewDefault" width="80" height="120"></canvas>
            <button onclick="buySkin('default',0)">Default (Free)</button>
        </div>

        <div class="skinBox">
            <canvas id="previewNinja" width="80" height="120"></canvas>
            <button onclick="buySkin('ninja',50)">Ninja Blue (50)</button>
        </div>

        <div class="skinBox">
            <canvas id="previewBlocky" width="80" height="120"></canvas>
            <button onclick="buySkin('blocky',75)">Blocky Green (75)</button>
        </div>

        <div class="skinBox">
            <canvas id="previewNeon" width="80" height="120"></canvas>
            <button onclick="buySkin('neon',100)">Neon Red (100)</button>
        </div>

        <div class="skinBox">
            <canvas id="previewGold" width="80" height="120"></canvas>
            <button onclick="buySkin('gold',200)">Gold (200)</button>
        </div>

    </div>

    <p id="shopMessage"></p>
    <button onclick="backMenu()">BACK</button>
</div>

<!-- GAME OVER -->
<div id="gameOverScreen" class="screen hidden">
    <h2>GAME OVER</h2>
    <p id="finalScore"></p>
    <button onclick="restartGame()">RESTART</button>
    <button onclick="backMenu()">MAIN MENU</button>
</div>

<!-- TUTORIAL -->
<div id="tutorialOverlay" class="hidden"></div>

<!-- GAME CANVAS -->
<canvas id="gameCanvas"></canvas>

<script>
/* ============================================================
   CANVAS + PLAYER SETUP
============================================================ */
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

let gameMode="menu";
let gravity=0.9;
let speed=7;
let coins=0;
let score=0;
let groundY;

let ownedSkins = new Set(["default"]);
let currentSkin = "default";

let player={
    x:200,y:0,width:40,height:90,
    velocityY:0,jumping:false,doubleJump:false,
    sliding:false,rotation:0,
    legAngle:0,armAngle:0
};

let fireBalls=[];
let coinObjects=[];
let smoke=[];

function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
    groundY=canvas.height-140;
}
window.addEventListener("resize",resize);
resize();
loadGame();

/* ============================================================
   CONTROLS
============================================================ */
document.addEventListener("keydown",e=>{
    if(e.code==="Space"||e.code==="ArrowUp"){
        if(!player.jumping){
            player.velocityY=-20;
            player.jumping=true;
        }else if(!player.doubleJump){
            player.velocityY=-22;
            player.doubleJump=true;
        }
    }
    if(e.code==="ArrowDown") player.sliding=true;
});
document.addEventListener("keyup",e=>{
    if(e.code==="ArrowDown") player.sliding=false;
});

/* ============================================================
   MENU FUNCTIONS
============================================================ */
function hideAll(){
    document.querySelectorAll(".screen").forEach(s=>s.classList.add("hidden"));
    canvas.style.display="none";
    document.getElementById("tutorialOverlay").classList.add("hidden");
}

function startGame(){
    hideAll();
    canvas.style.display="block";
    gameMode="game";
    reset();
    requestAnimationFrame(loop);
}

function startTutorial(){
    hideAll();
    canvas.style.display="block";
    gameMode="tutorial";
    reset();
    const t=document.getElementById("tutorialOverlay");
    t.classList.remove("hidden");
    t.innerText="Druk SPATIE om te springen";
    requestAnimationFrame(loop);
}

function openShop(){
    hideAll();
    document.getElementById("shopScreen").classList.remove("hidden");
    document.getElementById("coinDisplay").innerText=coins;
    document.getElementById("shopMessage").innerText="";
    drawShopPreviews();
}

function backMenu(){
    hideAll();
    gameMode="menu";
    document.getElementById("mainMenu").classList.remove("hidden");
}

function restartGame(){
    document.getElementById("gameOverScreen").classList.add("hidden");
    startGame();
}

/* ============================================================
   SHOP LOGIC
============================================================ */
function buySkin(skin, price){
    const msg=document.getElementById("shopMessage");

    if(ownedSkins.has(skin)){
        currentSkin=skin;
        msg.innerText="Skin geselecteerd: "+skin.toUpperCase();
        return;
    }

    if(coins>=price){
        coins-=price;
        ownedSkins.add(skin);
        currentSkin=skin;
        document.getElementById("coinDisplay").innerText=coins;
        msg.innerText="Gekocht en geselecteerd: "+skin.toUpperCase();
    }else{
        msg.innerText="Te weinig coins!";
    }
    if(ownedSkins.has(skin)){ currentSkin=skin; msg.innerText="Skin geselecteerd: "+skin.toUpperCase(); saveGame(); // <-- toevoegen return; }

    if(coins>=price){
    coins-=price;
    ownedSkins.add(skin);
    currentSkin=skin;
    document.getElementById("coinDisplay").innerText=coins;
    msg.innerText="Gekocht en geselecteerd: "+skin.toUpperCase();
    saveGame(); // <-- toevoegen
}

}

}

/* ============================================================
   GAME RESET
============================================================ */
function reset(){
    score=0;
    speed=7;
    fireBalls=[];
    coinObjects=[];
    smoke=[];
    player.y=groundY-player.height;
    player.velocityY=0;
    player.rotation=0;
}

/* ============================================================
   FIREBALLS
============================================================ */
function spawnFireBall(){
    fireBalls.push({
        x:canvas.width,
        y:groundY-60-Math.random()*200,
        size:25,
        speed:speed+3,
        flame:[]
    });
}

function updateFireBalls(){
    fireBalls.forEach((b,i)=>{
        b.x-=b.speed;

        b.flame.push({
            x:b.x+(Math.random()*20-10),
            y:b.y+(Math.random()*20-10),
            size:Math.random()*10+5,
            alpha:1
        });

        if(b.x<-100) fireBalls.splice(i,1);
    });
}

function drawFireBalls(){
    fireBalls.forEach(b=>{
        b.flame.forEach(f=>{
            ctx.fillStyle=`rgba(255, ${100+Math.random()*100}, 0, ${f.alpha})`;
            ctx.beginPath();
            ctx.arc(f.x,f.y,f.size,0,Math.PI*2);
            ctx.fill();
            f.alpha-=0.03;
        });

        ctx.fillStyle="black";
        ctx.beginPath();
        ctx.arc(b.x,b.y,b.size,0,Math.PI*2);
        ctx.fill();
    });
}

function checkFireBallCollision(){
    fireBalls.forEach(b=>{
        let dx=(player.x+20)-b.x;
        let dy=(player.y+45)-b.y;
        let dist=Math.sqrt(dx*dx+dy*dy);

        if(dist<b.size+30){
            endGame();
        }
    });
}

/* ============================================================
   COINS
============================================================ */
function spawnCoin(){
    coinObjects.push({x:canvas.width,y:groundY-200-Math.random()*100});
}

function updateCoins(){
    coinObjects.forEach(c=>c.x-=speed);

    coinObjects.forEach((c,i)=>{
        if(player.x<c.x+20 &&
           player.x+player.width>c.x &&
           player.y<c.y+20 &&
           player.y+player.height>c.y){
            coins++;
            saveGame();
            coinObjects.splice(i,1);
        }
    });
}

function drawCoins(){
    coinObjects.forEach(c=>{
        ctx.fillStyle="gold";
        ctx.beginPath();
        ctx.arc(c.x,c.y,12,0,Math.PI*2);
        ctx.fill();
    });
}

/* ============================================================
   UPDATE LOOP
============================================================ */
function update(){
    player.velocityY+=gravity;
    player.y+=player.velocityY;

    if(player.y>=groundY-player.height){
        player.y=groundY-player.height;
        player.jumping=false;
        player.doubleJump=false;
        player.rotation=0;
    }

    if(player.doubleJump){
        player.rotation+=20;
    }

    player.legAngle+=0.2;
    player.armAngle+=0.25;

    updateFireBalls();
    updateCoins();
    checkFireBallCollision();

    if(gameMode==="game"){
        if(Math.random()<0.02) spawnFireBall();
        if(Math.random()<0.015) spawnCoin();
        score++;
        if(score%500===0) speed+=0.5;
    }
}

/* ============================================================
   BACKGROUND
============================================================ */
function drawCity(){
    ctx.fillStyle="#b3e0ff";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#222";
    ctx.fillRect(0,groundY,canvas.width,140);
}

/* ============================================================
   PLAYER DRAWING (ROTATION CENTERED)
============================================================ */
function drawPlayer(){
    ctx.save();
    ctx.translate(player.x+20, player.y+45);
    ctx.rotate(player.rotation * Math.PI/180);

    if(currentSkin==="default") drawPlayerDefault();
    else if(currentSkin==="gold") drawPlayerGold();
    else if(currentSkin==="ninja") drawPlayerNinja();
    else if(currentSkin==="blocky") drawPlayerBlocky();
    else if(currentSkin==="neon") drawPlayerNeon();
    else drawPlayerDefault();

    ctx.restore();
}

/* ============================================================
   SKIN FUNCTIONS
============================================================ */
function drawPlayerDefault(){
    ctx.strokeStyle="black";
    ctx.lineWidth=6;

    if(player.sliding){
        ctx.beginPath();
        ctx.moveTo(-20,0);
        ctx.lineTo(20,0);
        ctx.stroke();
    } else {
        ctx.beginPath();
        ctx.moveTo(0,-30);
        ctx.lineTo(0,30);
        ctx.stroke();
    }

    ctx.beginPath();
    ctx.arc(0,-45,15,0,Math.PI*2);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,-10);
    ctx.lineTo(Math.sin(player.armAngle)*25,10);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,-10);
    ctx.lineTo(-Math.sin(player.armAngle)*25,10);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,30);
    ctx.lineTo(Math.sin(player.legAngle)*25,70);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,30);
    ctx.lineTo(-Math.sin(player.legAngle)*25,70);
    ctx.stroke();
}

function drawPlayerGold(){
    ctx.strokeStyle="#ffd700";
    ctx.lineWidth=7;

    ctx.beginPath();
    ctx.arc(0,-45,17,0,Math.PI*2);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,-25);
    ctx.lineTo(0,35);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,-15);
    ctx.lineTo(Math.sin(player.armAngle)*30,10);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,-15);
    ctx.lineTo(-Math.sin(player.armAngle)*30,10);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,35);
    ctx.lineTo(Math.sin(player.legAngle)*30,75);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,35);
    ctx.lineTo(-Math.sin(player.legAngle)*30,75);
    ctx.stroke();
}

function drawPlayerNinja(){
    ctx.strokeStyle="#004e98";
    ctx.lineWidth=8;

    ctx.beginPath();
    ctx.arc(0,-45,16,0,Math.PI*2);
    ctx.stroke();

    ctx.strokeStyle="#ff0000";
    ctx.beginPath();
    ctx.moveTo(-15,-50);
    ctx.lineTo(15,-50);
    ctx.stroke();

    ctx.strokeStyle="#004e98";
    ctx.beginPath();
    ctx.moveTo(0,-30);
    ctx.lineTo(0,35);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,-15);
    ctx.lineTo(Math.sin(player.armAngle)*28,10);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,-15);
    ctx.lineTo(-Math.sin(player.armAngle)*28,10);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,35);
    ctx.lineTo(Math.sin(player.legAngle)*28,75);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,35);
    ctx.lineTo(-Math.sin(player.legAngle)*28,75);
    ctx.stroke();
}

function drawPlayerBlocky(){
    ctx.fillStyle="#2ecc71";
    ctx.strokeStyle="#145a32";
    ctx.lineWidth=4;

    ctx.fillRect(-15,-55,30,30);
    ctx.strokeRect(-15,-55,30,30);

    ctx.fillRect(-10,-25,20,50);
    ctx.strokeRect(-10,-25,20,50);

    ctx.fillRect(-25,-20,15,35);
    ctx.strokeRect(-25,-20,15,35);

    ctx.fillRect(10,-20,15,35);
    ctx.strokeRect(10,-20,15,35);

    ctx.fillRect(-12,25,12,35);
    ctx.strokeRect(-12,25,12,35);

    ctx.fillRect(0,25,12,35);
    ctx.strokeRect(0,25,12,35);
}

function drawPlayerNeon(){
    ctx.save();
    ctx.shadowColor="red";
    ctx.shadowBlur=15;
    ctx.strokeStyle="#ff1744";
    ctx.lineWidth=5;

    ctx.beginPath();
    ctx.arc(0,-45,15,0,Math.PI*2);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,-30);
    ctx.lineTo(0,30);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,-15);
    ctx.lineTo(Math.sin(player.armAngle)*30,10);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,-15);
    ctx.lineTo(-Math.sin(player.armAngle)*30,10);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,30);
    ctx.lineTo(Math.sin(player.legAngle)*30,70);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,30);
    ctx.lineTo(-Math.sin(player.legAngle)*30,70);
    ctx.stroke();

    ctx.restore();
}

/* ============================================================
   SHOP PREVIEWS
============================================================ */
function drawShopPreviews(){
    drawPreviewDefault("previewDefault");
    drawPreviewNinja("previewNinja");
    drawPreviewBlocky("previewBlocky");
    drawPreviewNeon("previewNeon");
    drawPreviewGold("previewGold");
}

function drawPreviewDefault(id){
    let c=document.getElementById(id);
    let x=c.getContext("2d");
    x.clearRect(0,0,c.width,c.height);
    x.strokeStyle="black";
    x.lineWidth=4;
    x.beginPath();
    x.moveTo(40,30);
    x.lineTo(40,80);
    x.stroke();
    x.beginPath();
    x.arc(40,20,10,0,Math.PI*2);
    x.stroke();
}

function drawPreviewGold(id){
    let c=document.getElementById(id);
    let x=c.getContext("2d");
    x.clearRect(0,0,c.width,c.height);
    x.strokeStyle="#ffd700";
    x.lineWidth=4;
    x.beginPath();
    x.moveTo(40,30);
    x.lineTo(40,80);
    x.stroke();
    x.beginPath();
    x.arc(40,20,11,0,Math.PI*2);
    x.stroke();
}

function drawPreviewNinja(id){
    let c=document.getElementById(id);
    let x=c.getContext("2d");
    x.clearRect(0,0,c.width,c.height);
    x.strokeStyle="#004e98";
    x.lineWidth=5;
    x.beginPath();
    x.arc(40,20,11,0,Math.PI*2);
    x.stroke();
    x.strokeStyle="#ff0000";
    x.beginPath();
    x.moveTo(30,15);
    x.lineTo(50,15);
    x.stroke();
}

function drawPreviewBlocky(id){
    let c=document.getElementById(id);
    let x=c.getContext("2d");
    x.clearRect(0,0,c.width,c.height);
    x.fillStyle="#2ecc71";
    x.strokeStyle="#145a32";
    x.lineWidth=3;
    x.fillRect(30,15,20,20);
    x.strokeRect(30,15,20,20);
}

function drawPreviewNeon(id){
    let c=document.getElementById(id);
    let x=c.getContext("2d");
    x.clearRect(0,0,c.width,c.height);
    x.strokeStyle="#ff1744";
    x.lineWidth=4;
    x.beginPath();
    x.arc(40,20,10,0,Math.PI*2);
    x.stroke();
}

/* ============================================================
   DRAW LOOP
============================================================ */
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawCity();
    drawPlayer();
    drawFireBalls();
    drawCoins();

    ctx.fillStyle="black";
    ctx.font="24px Segoe UI";
    ctx.fillText("Score: "+score,20,40);
    ctx.fillText("Coins: "+coins,20,70);
}

/* ============================================================
   GAME LOOP
============================================================ */
function loop(){
    if(gameMode==="menu") return;
    update();
    draw();
    requestAnimationFrame(loop);
}

/* ============================================================
   GAME OVER
============================================================ */
function endGame(){
    gameMode="menu";
    document.getElementById("gameOverScreen").classList.remove("hidden");
    document.getElementById("finalScore").innerText="Score: "+score;
}
/* ============================================================
   SAVE & LOAD SYSTEM
============================================================ */
function saveGame(){
    localStorage.setItem("coins", coins);
    localStorage.setItem("ownedSkins", JSON.stringify([...ownedSkins]));
    localStorage.setItem("currentSkin", currentSkin);
}

function loadGame(){
    let savedCoins = localStorage.getItem("coins");
    let savedSkins = localStorage.getItem("ownedSkins");
    let savedCurrentSkin = localStorage.getItem("currentSkin");

    if(savedCoins !== null) coins = parseInt(savedCoins);
    if(savedSkins !== null) ownedSkins = new Set(JSON.parse(savedSkins));
    if(savedCurrentSkin !== null) currentSkin = savedCurrentSkin;
}

</script>
</body>
</html>
