<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Urban Parkour Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="menu" class="screen">
    <h1>URBAN PARKOUR</h1>
    <button onclick="startGame()">PLAY</button>
    <button onclick="startTutorial()">TUTORIAL</button>
    <button onclick="openShop()">SHOP</button>
</div>

<div id="shop" class="screen hidden">
    <h2>SHOP</h2>
    <p>Coins: <span id="coinDisplay">0</span></p>
    <button onclick="selectSkin('black')">Black (Free)</button>
    <button onclick="buyGold()">Gold (20)</button>
    <button onclick="backMenu()">BACK</button>
</div>

<div id="gameOver" class="screen hidden">
    <h2>YOU FELL</h2>
    <button onclick="restart()">RESTART</button>
    <button onclick="backMenu()">MENU</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let groundY = canvas.height - 140;
let gameState = "menu";
let speed = 6;
let levelLength = 5000;
let progress = 0;

let coins = 0;
let goldUnlocked = false;
let currentSkin = "black";

let player = {
    x:150,
    y:0,
    width:40,
    height:90,
    velY:0,
    gravity:0.8,
    jumping:false,
    doubleJump:false,
    sliding:false,
    rotation:0,
    anim:0
};

let balls = [];
let gaps = [];
let coinObjects = [];

function resetLevel(isTutorial=false){
    balls=[];
    gaps=[];
    coinObjects=[];
    progress=0;

    player.y = groundY - player.height;
    player.velY = 0;
    player.jumping=false;
    player.doubleJump=false;
    player.rotation=0;

    if(isTutorial){
        balls.push({x:600,r:25});
        gaps.push({x:1000,w:150});
    } else {
        for(let i=800;i<levelLength;i+=1200){
            balls.push({x:i,r:25});
        }
        for(let i=1500;i<levelLength;i+=2000){
            gaps.push({x:i,w:150});
        }
        for(let i=500;i<levelLength;i+=700){
            coinObjects.push({x:i,y:groundY-200,collected:false});
        }
    }
}

function startGame(){
    hideScreens();
    canvas.style.display="block";
    gameState="playing";
    resetLevel(false);
}

function startTutorial(){
    hideScreens();
    canvas.style.display="block";
    gameState="tutorial";
    resetLevel(true);
}

function openShop(){
    hideScreens();
    document.getElementById("shop").classList.remove("hidden");
    document.getElementById("coinDisplay").innerText=coins;
}

function backMenu(){
    hideScreens();
    document.getElementById("menu").classList.remove("hidden");
    gameState="menu";
}

function restart(){
    document.getElementById("gameOver").classList.add("hidden");
    startGame();
}

function hideScreens(){
    document.querySelectorAll(".screen").forEach(s=>s.classList.add("hidden"));
    canvas.style.display="none";
}

function buyGold(){
    if(coins>=20){
        coins-=20;
        goldUnlocked=true;
        currentSkin="gold";
        document.getElementById("coinDisplay").innerText=coins;
    }
}

function selectSkin(name){
    if(name==="black") currentSkin="black";
    if(name==="gold" && goldUnlocked) currentSkin="gold";
}

document.addEventListener("keydown",e=>{
    if(e.code==="Space"){
        if(!player.jumping){
            player.velY=-18;
            player.jumping=true;
        } else if(!player.doubleJump){
            player.velY=-20;
            player.doubleJump=true;
            player.rotation=-360;
        }
    }
    if(e.code==="ArrowDown"){
        player.sliding=true;
    }
});

document.addEventListener("keyup",e=>{
    if(e.code==="ArrowDown"){
        player.sliding=false;
    }
});

function update(){
    player.anim+=0.15;

    player.velY+=player.gravity;
    player.y+=player.velY;

    if(player.y>=groundY-player.height){
        player.y=groundY-player.height;
        player.velY=0;
        player.jumping=false;
        player.doubleJump=false;
        player.rotation=0;
    }

    balls.forEach(b=>{
        b.x-=speed;
        let dx = player.x - b.x;
        let dy = (player.y+player.height) - (groundY-b.r);
        if(Math.sqrt(dx*dx+dy*dy)<b.r){
            gameOver();
        }
    });

    gaps.forEach(g=>{
        g.x-=speed;
        if(player.x>g.x && player.x<g.x+g.w && player.y>=groundY-player.height){
            gameOver();
        }
    });

    coinObjects.forEach(c=>{
        c.x-=speed;
        if(!c.collected &&
           player.x<c.x+20 &&
           player.x+player.width>c.x &&
           player.y<c.y+20 &&
           player.y+player.height>c.y){
            c.collected=true;
            coins++;
        }
    });

    progress+=speed;
    if(progress>=levelLength && gameState==="playing"){
        alert("LEVEL COMPLETE");
        backMenu();
    }
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#cce6ff";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#ffffff";
    ctx.fillRect(0,groundY,canvas.width,150);

    balls.forEach(b=>{
        ctx.fillStyle="black";
        ctx.beginPath();
        ctx.arc(b.x,groundY-b.r,b.r,0,Math.PI*2);
        ctx.fill();
    });

    gaps.forEach(g=>{
        ctx.fillStyle="#cce6ff";
        ctx.fillRect(g.x,groundY,g.w,150);
    });

    coinObjects.forEach(c=>{
        if(!c.collected){
            ctx.fillStyle="gold";
            ctx.beginPath();
            ctx.arc(c.x,c.y,10,0,Math.PI*2);
            ctx.fill();
        }
    });

    drawPlayer();
}

function drawPlayer(){
    ctx.save();
    ctx.translate(player.x+20,player.y+45);
    ctx.rotate(player.rotation*Math.PI/180);

    ctx.strokeStyle=currentSkin==="gold"?"gold":"black";
    ctx.lineWidth=6;

    if(player.sliding){
        ctx.beginPath();
        ctx.moveTo(-30,10);
        ctx.lineTo(30,10);
        ctx.stroke();
    } else {
        ctx.beginPath();
        ctx.moveTo(0,-30);
        ctx.lineTo(0,30);
        ctx.stroke();

        let legMove=Math.sin(player.anim)*25;
        ctx.beginPath();
        ctx.moveTo(0,30);
        ctx.lineTo(-25,30+legMove);
        ctx.moveTo(0,30);
        ctx.lineTo(25,30-legMove);
        ctx.stroke();

        let armMove=Math.cos(player.anim)*25;
        ctx.beginPath();
        ctx.moveTo(0,-10);
        ctx.lineTo(-30,-10+armMove);
        ctx.moveTo(0,-10);
        ctx.lineTo(30,-10-armMove);
        ctx.stroke();
    }

    ctx.beginPath();
    ctx.arc(0,-45,18,0,Math.PI*2);
    ctx.stroke();

    ctx.restore();
}

function gameOver(){
    gameState="over";
    document.getElementById("gameOver").classList.remove("hidden");
}

function loop(){
    if(gameState==="playing"||gameState==="tutorial"){
        update();
        draw();
    }
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
