<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Urban Parkour Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- MENU -->
<div id="menu" class="screen">
    <h1>URBAN PARKOUR</h1>
    <button onclick="startGame()">PLAY</button>
    <button onclick="openTutorial()">TUTORIAL</button>
    <button onclick="openShop()">SHOP</button>
</div>

<!-- TUTORIAL -->
<div id="tutorial" class="screen hidden">
    <h2>HOW TO PLAY</h2>
    <p>SPACE = Jump</p>
    <p>ARROW DOWN = Slide</p>
    <p>Avoid balls and gaps.</p>
    <p>Collect coins to unlock skins.</p>
    <button onclick="backMenu()">BACK</button>
</div>

<!-- SHOP -->
<div id="shop" class="screen hidden">
    <h2>SHOP</h2>
    <p>Coins: <span id="coinDisplay">0</span></p>
    <button onclick="buyGold()">Unlock Gold Skin (20 coins)</button>
    <button onclick="backMenu()">BACK</button>
</div>

<!-- GAME OVER -->
<div id="gameOver" class="screen hidden">
    <h2>YOU FELL</h2>
    <button onclick="restart()">RESTART</button>
    <button onclick="backMenu()">MENU</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let gravity = 0.8;
let speed = 6;
let groundY;

let coins = 0;
let goldUnlocked = false;
let usingGold = false;

let animationFrame = 0;

let player = {
    x:150,
    y:0,
    width:40,
    height:90,
    velocityY:0,
    jumping:false,
    sliding:false
};

let platforms=[];
let balls=[];
let gaps=[];
let coinObjects=[];
let gameRunning=false;

/* ---------- RESIZE ---------- */

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    groundY = canvas.height - 150;
}
window.addEventListener("resize", resize);
resize();

/* ---------- MENU NAV ---------- */

function startGame(){
    hideAll();
    canvas.style.display="block";
    resetLevel();
    gameRunning=true;
    requestAnimationFrame(loop);
}

function openTutorial(){
    hideAll();
    document.getElementById("tutorial").classList.remove("hidden");
}

function openShop(){
    hideAll();
    document.getElementById("shop").classList.remove("hidden");
    document.getElementById("coinDisplay").innerText = coins;
}

function backMenu(){
    hideAll();
    document.getElementById("menu").classList.remove("hidden");
}

function hideAll(){
    document.querySelectorAll(".screen").forEach(s=>s.classList.add("hidden"));
    canvas.style.display="none";
}

/* ---------- SHOP ---------- */

function buyGold(){
    if(coins >= 20){
        coins -= 20;
        goldUnlocked = true;
        usingGold = true;
        alert("Gold Skin Unlocked!");
    } else {
        alert("Not enough coins!");
    }
}

/* ---------- LEVEL ---------- */

function resetLevel(){
    player.y = groundY - player.height;
    player.velocityY = 0;

    platforms=[];
    balls=[];
    gaps=[];
    coinObjects=[];

    for(let i=600;i<4000;i+=800){
        platforms.push({x:i,width:200,height:20});
    }

    for(let i=1200;i<4000;i+=1500){
        balls.push({x:i,radius:25});
    }

    for(let i=2000;i<4000;i+=2000){
        gaps.push({x:i,width:150});
    }

    for(let i=500;i<4000;i+=600){
        coinObjects.push({x:i,y:groundY-200,collected:false});
    }
}

/* ---------- CONTROLS ---------- */

document.addEventListener("keydown",e=>{
    if(e.code==="Space" && !player.jumping){
        player.velocityY=-18;
        player.jumping=true;
    }
    if(e.code==="ArrowDown"){
        player.sliding=true;
    }
});

document.addEventListener("keyup",e=>{
    if(e.code==="ArrowDown"){
        player.sliding=false;
    }
});

/* ---------- UPDATE ---------- */

function update(){

    animationFrame += 0.15;

    player.velocityY += gravity;
    player.y += player.velocityY;

    if(player.y >= groundY - player.height){
        player.y = groundY - player.height;
        player.velocityY=0;
        player.jumping=false;
    }

    platforms.forEach(p=>{
        p.x -= speed;
    });

    balls.forEach(b=>{
        b.x -= speed;
        let dx = player.x - b.x;
        let dy = (player.y+player.height) - (groundY - b.radius);
        if(Math.sqrt(dx*dx + dy*dy) < b.radius){
            gameOver();
        }
    });

    gaps.forEach(g=>{
        g.x -= speed;
        if(player.x > g.x && player.x < g.x + g.width &&
           player.y >= groundY - player.height){
            gameOver();
        }
    });

    coinObjects.forEach(c=>{
        c.x -= speed;
        if(!c.collected &&
           player.x < c.x+20 &&
           player.x+player.width > c.x &&
           player.y < c.y+20 &&
           player.y+player.height > c.y){
            c.collected=true;
            coins++;
        }
    });
}

/* ---------- DRAW ---------- */

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#222";
    ctx.fillRect(0,groundY,canvas.width,150);

    platforms.forEach(p=>{
        ctx.fillStyle="#555";
        ctx.fillRect(p.x,groundY-100,p.width,p.height);
    });

    gaps.forEach(g=>{
        ctx.fillStyle="#111";
        ctx.fillRect(g.x,groundY,g.width,150);
    });

    balls.forEach(b=>{
        ctx.fillStyle="black";
        ctx.beginPath();
        ctx.arc(b.x,groundY-b.radius,b.radius,0,Math.PI*2);
        ctx.fill();
    });

    coinObjects.forEach(c=>{
        if(!c.collected){
            ctx.fillStyle="gold";
            ctx.beginPath();
            ctx.arc(c.x, c.y, 10, 0, Math.PI*2);
            ctx.fill();
        }
    });

    drawPlayer();
}

function drawPlayer(){

    ctx.save();
    ctx.translate(player.x+20, player.y+45);

    let skinColor = usingGold ? "gold" : "white";

    ctx.strokeStyle=skinColor;
    ctx.lineWidth=5;

    if(player.sliding){
        ctx.beginPath();
        ctx.moveTo(-30,0);
        ctx.lineTo(30,0);
        ctx.stroke();
    } else {
        ctx.beginPath();
        ctx.moveTo(0,-30);
        ctx.lineTo(0,30);
        ctx.stroke();

        let legMove = Math.sin(animationFrame)*20;
        let armMove = Math.cos(animationFrame)*20;

        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.lineTo(-20,legMove);
        ctx.moveTo(0,0);
        ctx.lineTo(20,-legMove);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0,-10);
        ctx.lineTo(-20,-10+armMove);
        ctx.moveTo(0,-10);
        ctx.lineTo(20,-10-armMove);
        ctx.stroke();
    }

    ctx.beginPath();
    ctx.arc(0,-45,15,0,Math.PI*2);
    ctx.stroke();

    ctx.restore();
}

/* ---------- LOOP ---------- */

function loop(){
    if(!gameRunning) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

/* ---------- STATES ---------- */

function gameOver(){
    gameRunning=false;
    document.getElementById("gameOver").classList.remove("hidden");
}

function restart(){
    document.getElementById("gameOver").classList.add("hidden");
    resetLevel();
    gameRunning=true;
    requestAnimationFrame(loop);
}

</script>
</body>
</html>
