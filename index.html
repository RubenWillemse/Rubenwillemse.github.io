<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Ultimate Parkour Runner</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="menu" class="screen">
    <h1>ULTIMATE PARKOUR</h1>
    <button onclick="startGame()">PLAY</button>
    <button onclick="openTutorial()">TUTORIAL</button>
    <button onclick="openShop()">SHOP</button>
</div>

<div id="tutorial" class="screen hidden">
    <h2>Tutorial</h2>
    <p>⬆️ = Spring</p>
    <p>⬆️⬆️ = Backflip</p>
    <p>⬇️ = Slide</p>
    <p>💰 Verzamel coins voor skins</p>
    <button onclick="backMenu()">Terug</button>
</div>

<div id="shop" class="screen hidden">
    <h2>Shop</h2>
    <p>Coins: <span id="coinDisplay">0</span></p>

    <button onclick="buySkin('black',0)">Default</button>
    <button onclick="buySkin('red',25)">Red (25)</button>
    <button onclick="buySkin('blue',50)">Blue (50)</button>
    <button onclick="buySkin('gold',100)">✨ GOLD (100)</button>

    <button onclick="backMenu()">Terug</button>
</div>

<canvas id="gameCanvas" width="1000" height="450" class="hidden"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let gameRunning = false;
let speed = 6;
let gravity = 0.8;
let score = 0;
let coins = 0;

let player = {
    x:150,
    y:300,
    width:30,
    height:70,
    velocityY:0,
    jumping:false,
    doubleJump:false,
    sliding:false,
    rotation:0,
    color:"black"
};

let obstacles=[];
let coinObjects=[];

function startGame(){
    document.querySelectorAll(".screen").forEach(s=>s.classList.add("hidden"));
    canvas.classList.remove("hidden");
    gameRunning=true;
    gameLoop();
}

function backMenu(){
    document.querySelectorAll(".screen").forEach(s=>s.classList.add("hidden"));
    document.getElementById("menu").classList.remove("hidden");
}

function openTutorial(){
    document.querySelectorAll(".screen").forEach(s=>s.classList.add("hidden"));
    document.getElementById("tutorial").classList.remove("hidden");
}

function openShop(){
    document.querySelectorAll(".screen").forEach(s=>s.classList.add("hidden"));
    document.getElementById("shop").classList.remove("hidden");
    document.getElementById("coinDisplay").innerText=coins;
}

function buySkin(color,cost){
    if(coins>=cost){
        coins-=cost;
        player.color=color;
        alert("Skin gekocht!");
    } else alert("Niet genoeg coins!");
}

document.addEventListener("keydown",e=>{
    if(e.key==="ArrowUp"){
        if(!player.jumping){
            player.velocityY=-15;
            player.jumping=true;
        }else if(!player.doubleJump){
            player.velocityY=-18;
            player.doubleJump=true;
            player.rotation=360;
        }
    }
    if(e.key==="ArrowDown"){
        player.sliding=true;
    }
});

document.addEventListener("keyup",e=>{
    if(e.key==="ArrowDown"){
        player.sliding=false;
    }
});

function spawnObstacle(){
    obstacles.push({
        x:canvas.width,
        y:320,
        width:30,
        height:50
    });
}

function spawnCoin(){
    coinObjects.push({
        x:canvas.width,
        y:250,
        size:15
    });
}

function update(){
    player.velocityY+=gravity;
    player.y+=player.velocityY;

    if(player.y>=300){
        player.y=300;
        player.jumping=false;
        player.doubleJump=false;
        player.rotation=0;
    }

    obstacles.forEach(o=>o.x-=speed);
    coinObjects.forEach(c=>c.x-=speed);

    obstacles.forEach(o=>{
        if(player.x<o.x+o.width &&
           player.x+player.width>o.x &&
           player.y<o.y+o.height &&
           player.y+player.height>o.y){
            gameOver();
        }
    });

    coinObjects.forEach((c,i)=>{
        if(player.x<c.x+c.size &&
           player.x+player.width>c.x &&
           player.y<c.y+c.size &&
           player.y+player.height>c.y){
            coins++;
            coinObjects.splice(i,1);
        }
    });

    if(Math.random()<0.02) spawnObstacle();
    if(Math.random()<0.015) spawnCoin();

    score++;
    if(score%500===0) speed+=0.5;
}

function drawPlayer(){
    ctx.save();
    ctx.translate(player.x+15,player.y+35);
    ctx.rotate(player.rotation*Math.PI/180);
    ctx.fillStyle=player.color;

    // Body
    ctx.fillRect(-15,-35,30,70);

    // Head
    ctx.beginPath();
    ctx.arc(0,-50,15,0,Math.PI*2);
    ctx.fill();

    ctx.restore();
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Background gradient
    let grad=ctx.createLinearGradient(0,0,0,450);
    grad.addColorStop(0,"#1e3c72");
    grad.addColorStop(1,"#2a5298");
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // Ground
    ctx.fillStyle="#222";
    ctx.fillRect(0,370,canvas.width,80);

    drawPlayer();

    ctx.fillStyle="#ff3b3b";
    obstacles.forEach(o=>ctx.fillRect(o.x,o.y,o.width,o.height));

    ctx.fillStyle="gold";
    coinObjects.forEach(c=>{
        ctx.beginPath();
        ctx.arc(c.x,c.y,c.size,0,Math.PI*2);
        ctx.fill();
    });

    ctx.fillStyle="white";
    ctx.font="20px Arial";
    ctx.fillText("Score: "+score,20,30);
    ctx.fillText("Coins: "+coins,20,60);
}

function gameLoop(){
    if(!gameRunning) return;
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

function gameOver(){
    alert("Game Over! Score: "+score);
    location.reload();
}
</script>

</body>
</html>
