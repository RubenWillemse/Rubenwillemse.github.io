<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Urban Parkour Runner</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- MAIN MENU -->
<div id="mainMenu" class="screen">
    <h1>URBAN PARKOUR</h1>
    <button onclick="startGame()">PLAY</button>
    <button onclick="startTutorial()">TUTORIAL</button>
    <button onclick="openShop()">SHOP</button>
</div>

<!-- SHOP -->
<div id="shopScreen" class="screen hidden">
    <h2>SHOP</h2>
    <p>Coins: <span id="coinCount">0</span></p>

    <div class="shopGrid">
        <div class="skinBox">
            <canvas id="previewBlack" width="80" height="120"></canvas>
            <button onclick="buySkin('black',0)">Default</button>
        </div>

        <div class="skinBox">
            <canvas id="previewRed" width="80" height="120"></canvas>
            <button onclick="buySkin('red',50)">Red (50)</button>
        </div>

        <div class="skinBox">
            <canvas id="previewBlue" width="80" height="120"></canvas>
            <button onclick="buySkin('blue',100)">Blue (100)</button>
        </div>

        <div class="skinBox">
            <canvas id="previewGold" width="80" height="120"></canvas>
            <button onclick="buySkin('gold',200)">✨ Gold (200)</button>
        </div>
    </div>

    <button onclick="backToMenu()">BACK</button>
</div>

<!-- GAME OVER SCREEN -->
<div id="gameOverScreen" class="screen hidden">
    <h2>GAME OVER</h2>
    <p id="finalScore"></p>
    <button onclick="restartGame()">RESTART</button>
    <button onclick="backToMenu()">MAIN MENU</button>
</div>

<!-- TUTORIAL OVERLAY -->
<div id="tutorialOverlay" class="hidden tutorialText"></div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let gameMode = "menu"; // menu, game, tutorial
let gravity = 0.8;
let speed = 6;
let coins = 0;
let score = 0;
let groundY;

let player = {
    x:200,
    y:0,
    width:30,
    height:80,
    velocityY:0,
    jumping:false,
    doubleJump:false,
    sliding:false,
    rotation:0,
    color:"black",
    legAngle:0
};

let obstacles=[];

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    groundY = canvas.height - 120;
}
window.addEventListener("resize",resizeCanvas);
resizeCanvas();

/* ---------- START GAME ---------- */

function startGame(){
    hideAll();
    canvas.style.display="block";
    gameMode="game";
    resetGame();
    requestAnimationFrame(gameLoop);
}

function startTutorial(){
    hideAll();
    canvas.style.display="block";
    gameMode="tutorial";
    resetGame();
    document.getElementById("tutorialOverlay").classList.remove("hidden");
    tutorialStep = 0;
    showTutorialText();
    requestAnimationFrame(gameLoop);
}

function restartGame(){
    hideAll();
    startGame();
}

function resetGame(){
    score=0;
    speed=6;
    obstacles=[];
    player.y=groundY-player.height;
    player.velocityY=0;
}

/* ---------- MENU ---------- */

function openShop(){
    hideAll();
    document.getElementById("shopScreen").classList.remove("hidden");
    document.getElementById("coinCount").innerText=coins;
    drawPreviews();
}

function backToMenu(){
    hideAll();
    document.getElementById("mainMenu").classList.remove("hidden");
}

function hideAll(){
    document.querySelectorAll(".screen").forEach(s=>s.classList.add("hidden"));
    document.getElementById("tutorialOverlay").classList.add("hidden");
    canvas.style.display="none";
}

/* ---------- PLAYER CONTROLS ---------- */

document.addEventListener("keydown",e=>{
    if(e.key==="ArrowUp"){
        if(!player.jumping){
            player.velocityY=-18;
            player.jumping=true;
        } else if(!player.doubleJump){
            player.velocityY=-20;
            player.doubleJump=true;
        }
    }
    if(e.key==="ArrowDown"){
        player.sliding=true;
    }
});

document.addEventListener("keyup",e=>{
    if(e.key==="ArrowDown"){
        player.sliding=false;
    }
});

/* ---------- UPDATE ---------- */

function spawnObstacle(){
    obstacles.push({x:canvas.width,height:60});
}

function update(){
    player.velocityY+=gravity;
    player.y+=player.velocityY;

    if(player.y>=groundY-player.height){
        player.y=groundY-player.height;
        player.jumping=false;
        player.doubleJump=false;
        player.rotation=0;
    }

    if(player.doubleJump){
        player.rotation+=15;
    }

    player.legAngle+=0.15;

    obstacles.forEach(o=>o.x-=speed);

    obstacles.forEach(o=>{
        if(player.x < o.x+40 &&
           player.x+player.width > o.x &&
           player.y+player.height > groundY-o.height){
               if(gameMode==="game") endGame();
        }
    });

    if(gameMode==="game"){
        if(Math.random()<0.02) spawnObstacle();
        score++;
        if(score%500===0) speed+=0.5;
    }
}

/* ---------- DRAW ---------- */

function drawCity(){
    let grad=ctx.createLinearGradient(0,0,0,canvas.height);
    grad.addColorStop(0,"#87CEEB");
    grad.addColorStop(1,"#ffffff");
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#333";
    ctx.fillRect(0,groundY,canvas.width,120);
}

function drawPlayer(){
    ctx.save();
    ctx.translate(player.x+15,player.y+40);
    ctx.rotate(player.rotation*Math.PI/180);
    ctx.strokeStyle=player.color;
    ctx.lineWidth=6;

    ctx.beginPath();
    ctx.moveTo(0,-30);
    ctx.lineTo(0,30);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(0,-45,15,0,Math.PI*2);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,30);
    ctx.lineTo(Math.sin(player.legAngle)*20,60);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,30);
    ctx.lineTo(-Math.sin(player.legAngle)*20,60);
    ctx.stroke();

    ctx.restore();
}

function drawObstacles(){
    ctx.fillStyle="#8B4513";
    obstacles.forEach(o=>{
        ctx.fillRect(o.x,groundY-o.height,40,o.height);
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawCity();
    drawPlayer();
    drawObstacles();

    if(gameMode==="game"){
        ctx.fillStyle="black";
        ctx.fillText("Score: "+score,20,40);
    }
}

/* ---------- LOOP ---------- */

function gameLoop(){
    if(gameMode==="menu") return;
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

/* ---------- GAME OVER ---------- */

function endGame(){
    gameMode="menu";
    document.getElementById("gameOverScreen").classList.remove("hidden");
    document.getElementById("finalScore").innerText="Score: "+score;
}

/* ---------- SHOP PREVIEW ---------- */

function drawPreview(canvasId,color){
    let c=document.getElementById(canvasId);
    let context=c.getContext("2d");
    context.clearRect(0,0,c.width,c.height);
    context.strokeStyle=color;
    context.lineWidth=5;
    context.beginPath();
    context.moveTo(40,20);
    context.lineTo(40,80);
    context.stroke();
    context.beginPath();
    context.arc(40,10,10,0,Math.PI*2);
    context.stroke();
}

function drawPreviews(){
    drawPreview("previewBlack","black");
    drawPreview("previewRed","red");
    drawPreview("previewBlue","blue");
    drawPreview("previewGold","gold");
}

function buySkin(color,cost){
    if(coins>=cost){
        coins-=cost;
        player.color=color;
        alert("Skin gekocht!");
    } else alert("Niet genoeg coins!");
}

/* ---------- TUTORIAL ---------- */

let tutorialStep=0;

function showTutorialText(){
    let text=document.getElementById("tutorialOverlay");
    if(tutorialStep===0) text.innerText="Druk op ↑ om te springen";
    if(tutorialStep===1) text.innerText="Druk snel 2x ↑ voor een salto";
    if(tutorialStep===2) text.innerText="Druk op ↓ om te sliden";
}

document.addEventListener("keydown",e=>{
    if(gameMode==="tutorial"){
        if(e.key==="ArrowUp" && tutorialStep===0){ tutorialStep=1; showTutorialText(); }
        else if(e.key==="ArrowUp" && tutorialStep===1){ tutorialStep=2; showTutorialText(); }
        else if(e.key==="ArrowDown" && tutorialStep===2){
            tutorialStep=3;
            document.getElementById("tutorialOverlay").innerText="Tutorial klaar! Ga naar menu.";
        }
    }
});
</script>
</body>
</html>
