<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Urban Parkour</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- MENU -->
<div id="menu" class="screen">
    <h1>URBAN PARKOUR</h1>
    <button onclick="startGame()">PLAY</button>
</div>

<!-- LEVEL COMPLETE -->
<div id="levelComplete" class="screen hidden">
    <h2>LEVEL COMPLETE</h2>
    <button onclick="nextLevel()">NEXT LEVEL</button>
</div>

<!-- GAME OVER -->
<div id="gameOver" class="screen hidden">
    <h2>YOU FELL</h2>
    <button onclick="restart()">RESTART</button>
    <button onclick="backMenu()">MENU</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let level = 1;
let levelLength = 3000;
let progress = 0;
let gameRunning = false;

let gravity = 0.8;
let speed = 5;

let player = {
    x:150,
    y:0,
    width:40,
    height:90,
    velocityY:0,
    jumping:false,
    sliding:false
};

let groundY;
let platforms=[];
let balls=[];
let gaps=[];

/* ---------- SETUP ---------- */

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    groundY = canvas.height - 150;
}
window.addEventListener("resize", resize);
resize();

/* ---------- MENU ---------- */

function startGame(){
    document.getElementById("menu").classList.add("hidden");
    canvas.style.display="block";
    resetLevel();
    gameRunning=true;
    requestAnimationFrame(loop);
}

function restart(){
    document.getElementById("gameOver").classList.add("hidden");
    resetLevel();
    gameRunning=true;
}

function backMenu(){
    document.getElementById("gameOver").classList.add("hidden");
    canvas.style.display="none";
    document.getElementById("menu").classList.remove("hidden");
}

function nextLevel(){
    document.getElementById("levelComplete").classList.add("hidden");
    level++;
    speed += 1;
    levelLength += 1000;
    resetLevel();
    gameRunning=true;
}

/* ---------- LEVEL ---------- */

function resetLevel(){
    progress=0;
    platforms=[];
    balls=[];
    gaps=[];
    player.y = groundY - player.height;
    player.velocityY=0;

    // platforms
    for(let i=600;i<levelLength;i+=800){
        platforms.push({x:i,width:200,height:20});
    }

    // balls
    for(let i=1200;i<levelLength;i+=1500){
        balls.push({x:i,radius:25});
    }

    // gaps
    for(let i=1800;i<levelLength;i+=2000){
        gaps.push({x:i,width:150});
    }
}

/* ---------- CONTROLS ---------- */

document.addEventListener("keydown",e=>{
    if(e.code==="Space"){
        if(!player.jumping){
            player.velocityY=-18;
            player.jumping=true;
        }
    }
    if(e.code==="ArrowDown"){
        player.sliding=true;
    }
});

document.addEventListener("keyup",e=>{
    if(e.code==="ArrowDown"){
        player.sliding=false;
    }
});

/* ---------- UPDATE ---------- */

function update(){

    player.velocityY += gravity;
    player.y += player.velocityY;

    let onPlatform = false;

    // Ground
    if(player.y >= groundY - player.height){
        player.y = groundY - player.height;
        player.velocityY=0;
        player.jumping=false;
    }

    // Platforms
    platforms.forEach(p=>{
        p.x -= speed;

        if(player.x < p.x + p.width &&
           player.x + player.width > p.x &&
           player.y + player.height <= p.height + groundY - 100 &&
           player.y + player.height >= p.height + groundY - 110){
            player.y = groundY - 100 - player.height;
            player.velocityY=0;
            player.jumping=false;
            onPlatform=true;
        }
    });

    // Balls (only death by balls)
    balls.forEach(b=>{
        b.x -= speed;

        let dx = player.x - b.x;
        let dy = (player.y+player.height) - (groundY - b.radius);
        let dist = Math.sqrt(dx*dx + dy*dy);

        if(dist < b.radius){
            gameOver();
        }
    });

    // Gaps
    gaps.forEach(g=>{
        g.x -= speed;
        if(player.x > g.x && player.x < g.x + g.width &&
           player.y >= groundY - player.height){
            gameOver();
        }
    });

    progress += speed;

    if(progress >= levelLength){
        levelComplete();
    }
}

/* ---------- DRAW ---------- */

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Ground
    ctx.fillStyle="#222";
    ctx.fillRect(0,groundY,canvas.width,150);

    // Finish line
    ctx.fillStyle="white";
    ctx.fillRect(canvas.width - 50, groundY-200, 20, 200);

    // Platforms
    ctx.fillStyle="#555";
    platforms.forEach(p=>{
        ctx.fillRect(p.x, groundY-100, p.width, p.height);
    });

    // Balls
    ctx.fillStyle="black";
    balls.forEach(b=>{
        ctx.beginPath();
        ctx.arc(b.x, groundY-b.radius, b.radius, 0, Math.PI*2);
        ctx.fill();
    });

    // Gaps
    ctx.fillStyle="#111";
    gaps.forEach(g=>{
        ctx.fillRect(g.x, groundY, g.width, 150);
    });

    // Player
    ctx.save();
    ctx.translate(player.x+20, player.y+45);

    ctx.strokeStyle="gold";
    ctx.lineWidth=6;

    if(player.sliding){
        ctx.beginPath();
        ctx.moveTo(-25,0);
        ctx.lineTo(25,0);
        ctx.stroke();
    } else {
        ctx.beginPath();
        ctx.moveTo(0,-30);
        ctx.lineTo(0,30);
        ctx.stroke();
    }

    ctx.beginPath();
    ctx.arc(0,-45,15,0,Math.PI*2);
    ctx.stroke();

    ctx.restore();
}

/* ---------- LOOP ---------- */

function loop(){
    if(!gameRunning) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

/* ---------- STATES ---------- */

function gameOver(){
    gameRunning=false;
    document.getElementById("gameOver").classList.remove("hidden");
}

function levelComplete(){
    gameRunning=false;
    document.getElementById("levelComplete").classList.remove("hidden");
}

</script>
</body>
</html>
