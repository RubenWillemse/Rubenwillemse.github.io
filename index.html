<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Urban Parkour Runner</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- MAIN MENU -->
<div id="mainMenu" class="screen">
    <h1>URBAN PARKOUR</h1>
    <button onclick="openGame()">PLAY</button>
    <button onclick="openShop()">SHOP</button>
    <button onclick="openTutorial()">TUTORIAL</button>
</div>

<!-- SHOP SCREEN -->
<div id="shopScreen" class="screen hidden">
    <h2>SHOP</h2>
    <p>Coins: <span id="coinCount">0</span></p>

    <div class="shopItems">
        <button onclick="buySkin('black',0)">Default</button>
        <button onclick="buySkin('red',50)">Red (50)</button>
        <button onclick="buySkin('blue',100)">Blue (100)</button>
        <button onclick="buySkin('gold',200)">✨ Gold (200)</button>
    </div>

    <button onclick="backToMenu()">BACK</button>
</div>

<!-- TUTORIAL -->
<div id="tutorialScreen" class="screen hidden">
    <h2>Tutorial</h2>
    <p>⬆️ Spring</p>
    <p>⬆️⬆️ Salto</p>
    <p>⬇️ Slide</p>
    <p>💰 Verzamel coins</p>
    <button onclick="backToMenu()">BACK</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let gameRunning = false;
let speed = 6;
let gravity = 0.8;
let coins = 0;
let score = 0;

let player = {
    x:200,
    y:0,
    width:30,
    height:80,
    velocityY:0,
    jumping:false,
    doubleJump:false,
    sliding:false,
    rotation:0,
    color:"black",
    legAngle:0,
    armAngle:0
};

let obstacles=[];
let groundY;

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    groundY = canvas.height - 120;
}
window.addEventListener("resize",resizeCanvas);

function openGame(){
    document.querySelectorAll(".screen").forEach(s=>s.classList.add("hidden"));
    canvas.classList.remove("hidden");
    canvas.requestFullscreen();
    resizeCanvas();
    player.y = groundY - player.height;
    gameRunning=true;
    gameLoop();
}

function openShop(){
    hideAll();
    document.getElementById("shopScreen").classList.remove("hidden");
    document.getElementById("coinCount").innerText = coins;
}

function openTutorial(){
    hideAll();
    document.getElementById("tutorialScreen").classList.remove("hidden");
}

function backToMenu(){
    hideAll();
    document.getElementById("mainMenu").classList.remove("hidden");
}

function hideAll(){
    document.querySelectorAll(".screen").forEach(s=>s.classList.add("hidden"));
    canvas.classList.add("hidden");
}

function buySkin(color,cost){
    if(coins>=cost){
        coins-=cost;
        player.color=color;
        alert("Skin gekocht!");
    } else alert("Niet genoeg coins!");
}

document.addEventListener("keydown",e=>{
    if(e.key==="ArrowUp"){
        if(!player.jumping){
            player.velocityY=-18;
            player.jumping=true;
        } else if(!player.doubleJump){
            player.velocityY=-20;
            player.doubleJump=true;
        }
    }
    if(e.key==="ArrowDown"){
        player.sliding=true;
    }
});

document.addEventListener("keyup",e=>{
    if(e.key==="ArrowDown"){
        player.sliding=false;
    }
});

function spawnObstacle(){
    let types=["cone","wall","barrier"];
    let type = types[Math.floor(Math.random()*types.length)];
    obstacles.push({
        x:canvas.width,
        type:type
    });
}

function update(){
    player.velocityY+=gravity;
    player.y+=player.velocityY;

    if(player.y>=groundY-player.height){
        player.y=groundY-player.height;
        player.jumping=false;
        player.doubleJump=false;
        player.rotation=0;
    }

    if(player.doubleJump){
        player.rotation += 15;
    }

    player.legAngle += 0.1;
    player.armAngle += 0.1;

    obstacles.forEach(o=>o.x-=speed);

    obstacles.forEach(o=>{
        let h=60;
        if(o.type==="cone") h=40;
        if(player.x < o.x+40 &&
           player.x+player.width > o.x &&
           player.y+player.height > groundY-h){
            gameOver();
        }
    });

    if(Math.random()<0.02) spawnObstacle();

    score++;
    if(score%500===0) speed+=0.5;
}

function drawCity(){
    // Sky
    let grad=ctx.createLinearGradient(0,0,0,canvas.height);
    grad.addColorStop(0,"#87CEEB");
    grad.addColorStop(1,"#ffffff");
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // Buildings
    ctx.fillStyle="#555";
    for(let i=0;i<canvas.width;i+=200){
        ctx.fillRect(i,groundY-200,150,200);
    }

    // Road
    ctx.fillStyle="#333";
    ctx.fillRect(0,groundY,canvas.width,120);

    ctx.strokeStyle="white";
    ctx.lineWidth=5;
    for(let i=0;i<canvas.width;i+=80){
        ctx.beginPath();
        ctx.moveTo(i,groundY+60);
        ctx.lineTo(i+40,groundY+60);
        ctx.stroke();
    }
}

function drawPlayer(){
    ctx.save();
    ctx.translate(player.x+15,player.y+40);
    ctx.rotate(player.rotation*Math.PI/180);

    ctx.strokeStyle=player.color;
    ctx.lineWidth=6;

    // body
    ctx.beginPath();
    ctx.moveTo(0,-30);
    ctx.lineTo(0,30);
    ctx.stroke();

    // head
    ctx.beginPath();
    ctx.arc(0,-45,15,0,Math.PI*2);
    ctx.stroke();

    // arms
    ctx.beginPath();
    ctx.moveTo(0,-10);
    ctx.lineTo(Math.sin(player.armAngle)*20,0);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,-10);
    ctx.lineTo(-Math.sin(player.armAngle)*20,0);
    ctx.stroke();

    // legs
    ctx.beginPath();
    ctx.moveTo(0,30);
    ctx.lineTo(Math.sin(player.legAngle)*20,60);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,30);
    ctx.lineTo(-Math.sin(player.legAngle)*20,60);
    ctx.stroke();

    ctx.restore();
}

function drawObstacles(){
    obstacles.forEach(o=>{
        if(o.type==="cone"){
            ctx.fillStyle="orange";
            ctx.beginPath();
            ctx.moveTo(o.x,groundY);
            ctx.lineTo(o.x+20,groundY-40);
            ctx.lineTo(o.x+40,groundY);
            ctx.fill();
        }
        if(o.type==="wall"){
            ctx.fillStyle="#8B4513";
            ctx.fillRect(o.x,groundY-60,40,60);
        }
        if(o.type==="barrier"){
            ctx.fillStyle="red";
            ctx.fillRect(o.x,groundY-50,40,20);
        }
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawCity();
    drawPlayer();
    drawObstacles();

    ctx.fillStyle="black";
    ctx.font="20px Arial";
    ctx.fillText("Score: "+score,20,40);
}

function gameLoop(){
    if(!gameRunning) return;
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

function gameOver(){
    alert("Game Over! Score: "+score);
    location.reload();
}
</script>

</body>
</html>
